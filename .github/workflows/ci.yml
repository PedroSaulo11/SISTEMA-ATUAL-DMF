name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax checks
        run: npm run check:syntax

      - name: Security preflight
        run: npm run check:security
        env:
          SECURITY_GATE_STRICT: "false"

      - name: Readiness check
        run: npm run check:readiness

      - name: Smoke health
        run: npm run smoke:health

      - name: Smoke multiuser concurrency (local contract)
        run: npm run smoke:multiuser

      - name: Optional production audit fallback check
        if: ${{ secrets.BASE_URL != '' }}
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
        run: npm run check:audit-fallback:prod

      - name: Optional production session hardening check
        if: ${{ secrets.BASE_URL != '' }}
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        run: npm run check:session:prod

      - name: Optional production tenant/RBAC check
        if: ${{ secrets.BASE_URL != '' && (secrets.ACCESS_TOKEN != '' || (secrets.TEST_USERNAME != '' && secrets.TEST_PASSWORD != '')) }}
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          TEST_COMPANY: ${{ secrets.TEST_COMPANY }}
          TEST_COMPANY_FORBIDDEN: ${{ secrets.TEST_COMPANY_FORBIDDEN }}
        run: npm run check:multiuser:access:prod

      - name: Optional production concurrent load check
        if: ${{ secrets.BASE_URL != '' && secrets.ACCESS_TOKEN != '' }}
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          TEST_COMPANY: ${{ secrets.TEST_COMPANY }}
          LOAD_WORKERS: ${{ secrets.LOAD_WORKERS }}
          LOAD_ROUNDS: ${{ secrets.LOAD_ROUNDS }}
          LOAD_PAUSE_MS: ${{ secrets.LOAD_PAUSE_MS }}
        run: npm run load:prod:multiuser
